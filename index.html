<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Reportes - Grupo Crediland</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f6f9;
            color: #333;
        }
        /* Pantalla de Login */
        #login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #ffffff;
            z-index: 10;
        }
        .login-box {
            padding: 40px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .logo-container {
            margin-bottom: 25px;
        }
        .logo-container img {
            max-width: 80%;
            height: auto;
        }
        .login-box h2 {
            margin-bottom: 24px;
            color: #333;
            font-size: 20px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #004b93;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #004b93;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background-color: #00366b;
        }
        .error-msg {
            color: #de350b;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        
        /* Contenedor Principal de Reportes (Oculto al inicio) */
        #main-container {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }
        
        /* Barra de Navegación Superior */
        header {
            background: #004b93;
            color: #fff;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-tabs {
            display: flex;
            height: 100%;
            align-items: flex-end;
        }
        .tab-button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 15px 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            height: calc(100% - 10px);
            border-radius: 6px 6px 0 0;
            transition: all 0.2s;
            margin-right: 5px;
        }
        .tab-button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        .tab-button.active {
            color: #004b93;
            background: #f4f6f9;
            font-weight: bold;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        /* Área de visualización del reporte */
        .report-content {
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 60px);
            display: none;
        }
        .report-content.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

            <h2>Control de Acceso</h2>
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña">
            </div>
            <button class="btn-login" onclick="validateLogin()">Iniciar Sesión</button>
            <div id="error-message" class="error-msg">Usuario o contraseña incorrectos.</div>
        </div>
    </div>

    <!-- PORTAL DE REPORTES CON PESTAÑAS -->
    <div id="main-container">
        <header>
            <div class="nav-tabs">
                <button class="tab-button active" onclick="switchTab(event, 'reporte-operativos')">Reportes Operativos</button>
                <button class="tab-button" onclick="switchTab(event, 'credito-cobranza')">Crédito y Cobranza</button>
            </div>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </header>

        <!-- Pestaña 1: Reportes Operativos -->
        <div id="reporte-operativos" class="report-content active">
            <iframe title="Reporte ventas-inventario" src="https://app.powerbi.com/view?r=eyJrIjoiMDQ5Mzg4ZTgtMWJkNS00ZGJlLWIzNGQtYmNmY2UzNmMwODRkIiwidCI6IjRhMDliZWZiLTg5NTgtNGNmMC04OWU4LTM3ZDMwYzk1ODFjOCJ9" allowFullScreen="true"></iframe>
        </div>

        <!-- Pestaña 2: Crédito y Cobranza -->
        <div id="credito-cobranza" class="report-content">
            <!-- NOTA: Reemplaza el src de abajo con tu segundo enlace de Power BI cuando lo tengas generado -->
            <iframe title="Reporte Crédito y Cobranza" src="https://app.powerbi.com/view?r=eyJrIjoiMDQ5Mzg4ZTgtMWJkNS00ZGJlLWIzNGQtYmNmY2UzNmMwODRkIiwidCI6IjRhMDliZWZiLTg5NTgtNGNmMC04OWU4LTM3ZDMwYzk1ODFjOCJ9" allowFullScreen="true"></iframe>
        </div>
    </div>

    <script>
        function validateLogin() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-message');

            if (userIn === 'crediland' && passIn === 'crediland') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
            } else {
                errorMsg.style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('error-message').style.display = 'none';
            
            document.getElementById('login-container').style.display = 'flex';
            document.getElementById('main-container').style.display = 'none';
        }

        function switchTab(event, tabId) {
            const contents = document.getElementsByClassName('report-content');
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove('active');
            }

            const buttons = document.getElementsByClassName('tab-button');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }

            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const loginContainer = document.getElementById('login-container');
                if (loginContainer.style.display !== 'none') {
                    validateLogin();
                }
            }
        });
    </script>
